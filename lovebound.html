<!DOCTYPE html>
<html>
<head>
  <title>Love Bound</title>

  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="villa-bg">

<!-- LOGO TITLE -->
<div class="title-logo">
  <img src="images/loveboundlogo.png" alt="Love Bound">
</div>

<div class="controls">
  <input id="searchInput" type="text" placeholder="Search characters..." onkeyup="filterCards()">
</div>

<div class="grid" id="cardGrid">

  <a class="card" href="cast/og/eunji.html"
     data-name="eunji choi engineer aerospace flirt charm og">

    <img src="images/eunji.jpg">

    <div class="info">
      <h3>Eunji</h3>
      <p>Aerospace Engineer</p>
    </div>

  </a>

</div>

<script>
function filterCards() {
  const input = document.getElementById("searchInput");
  const filter = input.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.getAttribute("data-name");

    if (text.includes(filter)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
