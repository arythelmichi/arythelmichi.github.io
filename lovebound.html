/* =========================

const wildcards = [

    role: "Influencer",
    tags: "mira solis influencer filipina wildcard"
  }
];

/* =========================
   GENERATE FUNCTION
========================= */
function generateCards(list, containerId) {
  const container = document.getElementById(containerId);

  list.forEach(char => {
    const card = document.createElement("a");
    card.className = "card";
    card.href = char.file;
    card.setAttribute("data-name", char.tags);

    card.innerHTML = `
      <img src="${char.img}">
      <div class="card-hover">
        <h3>${char.name.toUpperCase()}</h3>
        <p>${char.role}</p>
      </div>
    `;

    container.appendChild(card);
  });
}

/* =========================
   RUN GENERATION
========================= */
generateCards(characters, "cardGrid");
generateCards(wildcards, "wildGrid");

/* =========================
   SEARCH (WORKS FOR BOTH)
========================= */
function filterCards() {
  const input = document.getElementById("searchInput");
  const filter = input.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.getAttribute("data-name");
    card.style.display = text.includes(filter) ? "" : "none";
  });
}
</script>
