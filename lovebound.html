<!DOCTYPE html>
<html>
<head>
 <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet"> 
  <title>Love Bound</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<script>
const cards = document.querySelectorAll(".card");
const info = document.querySelector(".hover-info");

cards.forEach(card => {
  const hoverBox = card.querySelector(".hover-info");

  card.addEventListener("mousemove", (e) => {
    hoverBox.style.left = e.clientX + 15 + "px";
    hoverBox.style.top = e.clientY + 15 + "px";
    hoverBox.style.opacity = 1;
  });

  card.addEventListener("mouseleave", () => {
    hoverBox.style.opacity = 0;
  });
});
</script>
 
<body class="villa-bg">

<h1>💘 Love Bound: LOVE OR MONEY Cast</h1>

<div class="grid">

  <a class="card" href="cast/og/eunji.html">
    <img src="images/eunji.jpg">

    <div class="info">
      <h3>Eunji</h3>
      <p>The Chill Engineer</p>
    </div>
  </a>

</div>

</body>
</html>
