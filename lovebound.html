<!DOCTYPE html>
<html>
<head>
  <title>Love Bound Archive</title>

  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="villa-bg">

<!-- TITLE -->
<div class="title-logo">
  <img src="images/lovebound-title.png" alt="Love Bound">
</div>

<!-- SEARCH -->
<div class="controls">
  <input id="searchInput" type="text" placeholder="Search characters..." onkeyup="filterCards()">
</div>

<!-- GRID -->
<div class="grid">

  <a class="card" href="cast/og/eunji.html"
     data-name="eujin eunji choi engineer aerospace charm og">

    <img src="images/eunji.jpg">

    <div class="info">
      <h3 class="hidden-name">Eujin</h3>
      <p>Aerospace Engineer</p>
    </div>

  </a>

</div>

<script>
function filterCards() {
  const input = document.getElementById("searchInput");
  const filter = input.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.getAttribute("data-name");

    card.style.display = text.includes(filter) ? "block" : "none";
  });
}
</script>

</body>
</html>
