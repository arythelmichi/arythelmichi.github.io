<body class="villa-bg">

<h1>Love Bound Cast</h1>

<!-- SEARCH BAR -->
<div class="controls">

  <input 
    id="searchInput"
    type="text"
    placeholder="Search characters..."
    onkeyup="filterCards()"
  />

</div>

<div class="grid" id="cardGrid">

  <a class="card" href="cast/og/eunji.html" data-name="eujin eunji choi engineer aerospace flirt charm og">

    <img src="images/eunji.jpg">

    <div class="info">
      <h3>Eujin</h3>
      <p>Aerospace Engineer</p>
    </div>

  </a>

</div>

<script>
function filterCards() {
  const input = document.getElementById("searchInput");
  const filter = input.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.getAttribute("data-name");

    if (text.includes(filter)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
