<!DOCTYPE html>
<html>
<head>
  <title>Love Bound</title>

  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="villa-bg">

<div class="lb-layout">

  <!-- LEFT SIDE -->
  <div class="lb-left">

    <input id="searchInput"
           type="text"
           placeholder="Search characters..."
           onkeyup="filterCards()">

    <h2 class="subheading">LOVE OR MONEY: Original Cast</h2>

    <div class="grid">

      <a class="card" href="cast/og/eunji.html"
         data-name="eujin eunji choi engineer aerospace charm og">

        <img src="images/eunjinotext.jpg">

        <div class="card-hover">
          <h3>Eunji</h3>
          <p>Aerospace Engineer</p>
        </div>

      </a>

    </div>

  </div>

  <!-- RIGHT LOGO -->
  <div class="lb-right">
    <img src="images/loveboundlogo.png" class="lb-logo">
  </div>

</div>

<script>
function filterCards() {
  const input = document.getElementById("searchInput");
  const filter = input.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.getAttribute("data-name");
    card.style.display = text.includes(filter) ? "block" : "none";
  });
}
</script>

</body>
</html>
