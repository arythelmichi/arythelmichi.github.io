<!DOCTYPE html>
<html>
<head>
  <title>Love Bound</title>

  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="villa-bg">

<div class="lb-layout">

  <!-- LEFT SIDE -->
  <div class="lb-left">

    <input id="searchInput"
           type="text"
           placeholder="Search characters..."
           onkeyup="filterCards()">

    <h2 class="subheading">LOVE OR MONEY: Original Cast</h2>

    <!-- GRID (AUTO GENERATED) -->
    <div class="grid" id="cardGrid"></div>

  </div>

  <!-- RIGHT LOGO -->
  <div class="lb-right">
    <img src="images/loveboundlogo.png" class="lb-logo">
  </div>

</div>

<script>
/* =========================
   CHARACTER DATA
========================= */
const characters = [
  {
    name: "Eunji Choi",
    file: "cast/og/eunji.html",
    img: "images/eunjinotext.jpg",
    role: "Aerospace Engineer",
    tags: "eunji choi engineer aerospace korean og"
  },
  
  {
    name: "Isaiah Bailiff",
    file: "cast/og/isaiah.html",
    img: "images/isaiahnotext.jpg",
    role: "Firefighter",
    tags: "isaiah bailiff firefighter brazil og"
  },

  {
    name: "Enzo Rodriguez",
    file: "cast/og/enzo.html",
    img: "images/enzonotext.jpg",
    role: "Paramedic",
    tags: "enzo rodriguez paramedic spanish og"
  },

   {
    name: "Noah Acres",
    file: "cast/og/noah.html",
    img: "images/noahnotext.jpg",
    role: "Disc Jockey",
    tags: "noah acres american california dj disc jockey og"
  },

   {
    name: "Arthur Wallace",
    file: "cast/og/arthur.html",
    img: "images/arthurnotext.jpg",
    role: "Luxury Real Estate Agent",
    tags: "arthur wallace real estate agent luxury british og"
  },

  // 👉 COPY THIS BLOCK AND ADD YOUR OTHER 24 CHARACTERS
];

/* =========================
   GENERATE CARDS
========================= */
const grid = document.getElementById("cardGrid");

characters.forEach(char => {
  const card = document.createElement("a");
  card.className = "card";
  card.href = char.file;
  card.setAttribute("data-name", char.tags);

  card.innerHTML = `
    <img src="${char.img}">
    <div class="card-hover">
      <h3>${char.name.toUpperCase()}</h3>
      <p>${char.role}</p>
    </div>
  `;

  grid.appendChild(card);
});

/* =========================
   SEARCH FILTER
========================= */
function filterCards() {
  const input = document.getElementById("searchInput");
  const filter = input.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const text = card.getAttribute("data-name");
    card.style.display = text.includes(filter) ? "block" : "none";
  });
}
</script>

</body>
</html>
