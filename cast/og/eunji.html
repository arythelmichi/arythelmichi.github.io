<!DOCTYPE html>
<html>
<head>
  <title>Choi Eunji</title>

  <style>
    body {
      background:#0b0b0f;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
    }

    .profile-card {
      width:340px;
      background:#1a1a1f;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,0.6);
    }

    .profile-img {
      width:100%;
      height:320px;
      object-fit:cover;
      display:block;
    }

    .content {
      padding:18px;
    }

    .tag {
      display:inline-block;
      background:#ff4d6d;
      padding:4px 10px;
      border-radius:12px;
      font-size:11px;
      margin-bottom:10px;
    }

    .name {
      font-size:24px;
      font-weight:bold;
    }

    .role {
      color:#aaa;
      font-size:14px;
      margin-bottom:15px;
    }

    .stat {
      margin:12px 0;
      font-size:13px;
    }

    .bar {
      height:8px;
      background:#2a2a2f;
      border-radius:20px;
      overflow:hidden;
      margin-top:5px;
    }

    .fill {
      height:100%;
      background:linear-gradient(90deg,#ff4d6d,#ff7a9a);
    }

    .back {
      display:inline-block;
      margin-top:15px;
      color:#ff4d6d;
      text-decoration:none;
      font-size:13px;
    }

    .back:hover {
      text-decoration:underline;
    }

  </style>
</head>

<body>

<div class="profile-card">

  <!-- IMAGE (2 levels up → images folder in root) -->
  <img class="profile-img" src="../../images/eunji.jpg">

  <div class="content">

    <div class="tag">LOVE BOUND: LOVE OR MONEY CAST</div>

    <div class="name">Choi Eunji</div>
    <div class="role">The Chill, Laid-back Engineer</div>

    <div class="stat">
      Loyalty
      <div class="bar"><div class="fill" style="width:50%"></div></div>
    </div>

    <div class="stat">
      Drama
      <div class="bar"><div class="fill" style="width:60%"></div></div>
    </div>

    <div class="stat">
      Charm
      <div class="bar"><div class="fill" style="width:90%"></div></div>
    </div>

    <!-- BACK BUTTON (2 levels up to root) -->
    <a class="back" href="../../lovebound.html">← Back to Cast</a>

  </div>

</div>

</body>
</html>
