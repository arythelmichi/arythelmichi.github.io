<!DOCTYPE html>
<html>
<head>
  <title>Choi Eunji</title>

  <style>
    body {
      background:#111;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .profile-card {
      width:300px;
      margin:40px auto;
      background:#1c1c1c;
      padding:20px;
      border-radius:15px;
    }

    .profile-card img {
      width:100%;
      height:300px;
      object-fit:cover;
      border-radius:10px;
    }

    .stat {
      margin:10px 0;
    }

    .bar {
      height:8px;
      background:#333;
      border-radius:10px;
      overflow:hidden;
    }

    .fill {
      height:100%;
      background:#ff4d6d;
    }
  </style>
</head>

<body>

<div class="profile-card">

  <img src="../images/eunji.jpg">

  <h2>Eunji</h2>
  <p>The chill, laid-back engineer.</p>

  <div class="stat">
    Loyalty
    <div class="bar"><div class="fill" style="width:70%"></div></div>
  </div>

  <div class="stat">
    Drama
    <div class="bar"><div class="fill" style="width:40%"></div></div>
  </div>

  <div class="stat">
    Charm
    <div class="bar"><div class="fill" style="width:90%"></div></div>
  </div>

</div>

<a href="../lovebound.html">⬅ Back</a>

</body>
</html>
